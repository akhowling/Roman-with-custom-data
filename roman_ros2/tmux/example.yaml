session_name: roman_ros2

environment:
  BAG: ${BAG}
  ROBOT: ${ROBOT}
  CAMERA: ${CAMERA}
  ROMAN_WS: ${ROMAN_WS}
  ACTIVATE_ROMAN_ENV: ${ACTIVATE_ROMAN_ENV}

options:
  default-command: /bin/bash

windows:
- window_name: roman_map
  layout: tiled
  focus: true
  shell_command_before:
  - source $ROMAN_WS/install/setup.bash
  - $ACTIVATE_ROMAN_ENV
  panes:
  - ros2 launch roman_ros2 fastsam_example.launch.py robot:=$ROBOT camera:=$CAMERA
  - ros2 launch roman_ros2 roman_map_example.launch.py robot:=$ROBOT camera:=$CAMERA

- window_name: bag2
  layout: tiled
  shell_command_before:
  - source $ROMAN_WS/install/setup.bash
  panes:
  - ros2 launch roman_ros2 offline_data.launch.py robot:=$ROBOT camera:=$CAMERA bag:=$BAG uncompress_rgb:=true