dt: 0.166666666666666667
runs: [run1, run2]
run_env: "RUN"
img_data:
    path: ${OUTPUT_ROOT}/${RUN}/bag
    topic: /robot/zed/rgb/image_rect_color/compressed
    camera_info_topic: /robot/zed/rgb/camera_info
    compressed: True
    color_space: 'bgr8'
depth_data:
    path: ${OUTPUT_ROOT}/${RUN}/bag
    topic: /robot/zed/depth/depth_registered
    camera_info_topic: /robot/zed/depth/camera_info
    compressed: False
pose_data:
    type: bag
    path: ${OUTPUT_ROOT}/${RUN}/bag
    topic: /robot/zed/odom
    time_tol: 10.0
    T_camera_flu:
        input_type: "string"
        string: "T_RDFFLU"
    T_odombase_camera:
        input_type: "tf"
        parent: "zed_camera_link"
        child: "zed_left_camera_optical_frame"
