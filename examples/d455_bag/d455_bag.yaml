session_name: roman_ros2

environment:
  ROMAN_BAG: /home/anuriha/roman_ws/ugv_rosbag
  ROMAN_OUTPUT_DIR: /home/anuriha/roman_ws/my_outputs
  ROMAN_PRIOR_MAP: ${ROMAN_PRIOR_MAP}
  ROMAN_ROS_WS: /home/anuriha/roman_ws
  ROMAN_ENV_ACTIVATE: ""
  ROMAN_CAMERA: d455
  ROMAN_ROBOT_NAME: robot
  ROMAN_LC_CONFIG_DIR: /home/anuriha/roman_ws/src/roman_ros2/roman_ros2/cfg/d455
  ROS_DOMAIN_ID: "88"

options:
  default-command: /bin/bash

windows:
- window_name: roman
  layout: tiled
  shell_command_before:
  - conda deactivate || true
  - unset PYTHONHOME PYTHONPATH
  - source /opt/ros/humble/setup.bash
  - source /home/anuriha/roman_ws/install/setup.bash
  - source /home/anuriha/roman_ws/venv/bin/activate
  - export ROS_DOMAIN_ID=$ROS_DOMAIN_ID

  panes:
  - ros2 launch roman_ros2 roman.launch.yaml robot_name:=$ROMAN_ROBOT_NAME camera:=$ROMAN_CAMERA launch_fastsam:=true sim_time:=true
  - ros2 launch roman_ros2 roman.launch.yaml robot_name:=$ROMAN_ROBOT_NAME camera:=$ROMAN_CAMERA launch_mapping:=true output_dir:=$ROMAN_OUTPUT_DIR sim_time:=true
  - ros2 launch roman_ros2 roman.launch.yaml robot_name:=$ROMAN_ROBOT_NAME camera:=$ROMAN_CAMERA launch_loop_closure:=true launch_loop_closure_viz:=true config_dir:=$ROMAN_LC_CONFIG_DIR output_dir:=$ROMAN_OUTPUT_DIR sim_time:=true
  - rviz2 -d $ROMAN_ROS_WS/src/roman_ros2/examples/d455_single_session/d455_online.rviz
  - "echo debug pane ready"


- window_name: bag
  layout: tiled
  shell_command_before:
  - conda deactivate || true
  - unset PYTHONHOME PYTHONPATH
  - source /opt/ros/humble/setup.bash
  - source /home/anuriha/roman_ws/install/setup.bash
  - source /home/anuriha/roman_ws/venv/bin/activate
  - export ROS_DOMAIN_ID=$ROS_DOMAIN_ID
  panes:
  - ros2 bag play $ROMAN_BAG --clock --qos-profile-overrides-path /home/anuriha/roman_ws/qos/ugv_qos.yaml
  # - ros2 bag play $ROMAN_BAG --clock -l --start-offset 1.0 --qos-profile-overrides-path /home/anuriha/roman_ws/qos/ugv_qos.yaml
  

  - "echo bag pane ready"


  - /home/anuriha/roman_ws/run_ugv_relays.sh
  # - python3 /home/anuriha/roman_ws/odom_to_tf.py
  # - python3 /home/anuriha/roman_ws/lidar_to_depth.py
  # - sleep 3 && ros2 bag play $ROMAN_BAG --clock -l --qos-profile-overrides-path /home/anuriha/roman_ws/qos/ugv_qos.yaml
  


  

