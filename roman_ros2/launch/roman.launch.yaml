---
launch:
  - arg: {name: robot_name}
  - arg: {name: camera}
  - arg: {name: output_dir, default: "~/.roman_ros2"}
  - arg: {name: launch_fastsam, default: "false"}
  - arg: {name: launch_mapping, default: "false"}
  - arg: {name: launch_loop_closure, default: "false"}
  - arg: {name: launch_loop_closure_viz, default: "false"}

  #########################################
  #                 d455                  #
  #########################################
  - group:
    - set_remap: {from: color/camera_info, to: $(var camera)/color/camera_info}
    - set_remap: {from: color/image_raw, to: $(var camera)/color/image_raw}
    - set_remap: {from: depth/camera_info, to: $(var camera)/aligned_depth_to_color/camera_info}
    - set_remap: {from: depth/image_raw, to: $(var camera)/aligned_depth_to_color/image_raw}
    - set_remap: {from: tf, to: /tf}
    - set_remap: {from: tf_static, to: /tf_static}

    - include:
        if: $(eval '"$(var camera)" == "d455"')
        file: $(find-pkg-share roman_ros2)/launch/roman_node.launch.yaml
        arg:
          - {name: robot_name, value: $(var robot_name)}
          - {name: camera, value: $(var camera)}
          - {name: output_dir, value: $(var output_dir)}
          - {name: launch_fastsam, value: $(var launch_fastsam)}
          - {name: launch_mapping, value: $(var launch_mapping)}
          - {name: launch_loop_closure, value: $(var launch_loop_closure)}
          - {name: launch_loop_closure_viz, value: $(var launch_loop_closure_viz)}
      
  #########################################
  #                zed2i                  #
  #########################################
  - group:
    - set_remap: {from: color/camera_info, to: zed/rgb/camera_info}
    - set_remap: {from: color/image_raw, to: zed/rgb/image_rect_color}
    - set_remap: {from: depth/camera_info, to: zed/depth/camera_info}
    - set_remap: {from: depth/image_raw, to: zed/depth/depth_registered}
    - set_remap: {from: tf, to: /tf}
    - set_remap: {from: tf_static, to: /tf_static}

    - include:
        if: $(eval '"$(var camera)" == "zed2i"')
        file: $(find-pkg-share roman_ros2)/launch/roman_node.launch.yaml
        arg:
          - {name: robot_name, value: $(var robot_name)}
          - {name: camera, value: $(var camera)}
          - {name: output_dir, value: $(var output_dir)}
          - {name: launch_fastsam, value: $(var launch_fastsam)}
          - {name: launch_mapping, value: $(var launch_mapping)}
          - {name: launch_loop_closure, value: $(var launch_loop_closure)}
          - {name: launch_loop_closure_viz, value: $(var launch_loop_closure_viz)}
